# Hooks for the archiso-capable initramfs. The `archiso` hook (from the
# mkinitcpio-archiso package) is what locates the ISO via label/UUID and
# mounts the squashfs as the real root. Without it, systemd's
# initrd-switch-root.service fails with "Failed to start Switch Root".
HOOKS=(base udev modconf archiso block filesystems)
