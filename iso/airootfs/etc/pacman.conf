# pacman.conf for the FactoriOS *live env* (and therefore for the installer's
# pacstrap, which reuses this config). The [factorios] repo points at the
# package cache that the build script stages into the airootfs.
[options]
HoldPkg = pacman glibc
Architecture = auto
CheckSpace
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[factorios]
SigLevel = Optional TrustAll
Server = file:///var/cache/factorios-repo
