# pacman.conf used by mkarchiso on the *build host* to populate the airootfs.
# We don't install factorios-* into the live env itself (only the installer
# pacstraps them into /mnt), so no [factorios] entry is needed here. The live
# env's own pacman config lives at iso/airootfs/etc/pacman.conf and *does*
# have the [factorios] file:// repo entry.
[options]
HoldPkg = pacman glibc
Architecture = auto
CheckSpace
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

