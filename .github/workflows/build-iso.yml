name: build-iso

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to attach the ISO to a release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ISO in Arch container
        # mkarchiso needs CAP_SYS_ADMIN, loop devices, and the ability to
        # bind-mount inside chroots. The simplest path is a privileged Arch
        # container; running it via `docker run` (rather than the workflow's
        # `container:` keyword) lets us pass --privileged.
        run: |
          set -euo pipefail
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE":/work -w /work \
            archlinux:latest bash -euo pipefail -c '
              # Fresh keyring first; the base image is sometimes a few weeks stale.
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm
              # `grub` provides grub-install / grub-mkrescue, needed by the
              # uefi.grub bootmode. archiso itself does not depend on it.
              pacman -S --noconfirm --needed \
                archiso grub base-devel sudo \
                python python-build python-installer python-setuptools python-wheel

              # makepkg refuses to run as root, so do the whole build as an
              # unprivileged user with passwordless sudo (iso/build.sh
              # self-elevates for mkarchiso).
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
              chown -R builder:builder /work
              sudo -u builder ./build.sh
            '

      - name: Locate built ISO
        id: iso
        run: |
          set -euo pipefail
          path=$(ls iso/out/*.iso | head -n1)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.name }}
          path: ${{ steps.iso.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach ISO to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.iso.outputs.path }}
          generate_release_notes: true
