name: build-iso

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to attach ISOs to a release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build ISOs in Arch container
        # mkarchiso needs CAP_SYS_ADMIN, loop devices, and the ability to
        # bind-mount inside chroots. The simplest path is a privileged Arch
        # container; running it via `docker run` (rather than the workflow's
        # `container:` keyword) lets us pass --privileged.
        #
        # Tag pushes (v*) get a *second* ISO build with linux-firmware
        # bundled — that's the "full" variant attached to the release for
        # bare-metal installs (WiFi, modern AMD/NVidia GPUs). Every other
        # push only gets the slim ISO.
        env:
          BUILD_FULL: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          set -euo pipefail
          docker run --rm --privileged \
            -e BUILD_FULL \
            -v "$GITHUB_WORKSPACE":/work -w /work \
            archlinux:latest bash -euo pipefail -c '
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm
              # `grub` provides grub-install / grub-mkrescue, needed by the
              # uefi.grub bootmode. `erofs-utils` is normally pulled in by
              # archiso but pin it just in case the dep graph changes.
              pacman -S --noconfirm --needed \
                archiso grub erofs-utils base-devel sudo \
                python python-build python-installer python-setuptools python-wheel

              # makepkg refuses to run as root, so do the whole build as an
              # unprivileged user with passwordless sudo.
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
              chown -R builder:builder /work

              # Slim build. Always runs.
              sudo -u builder ./build.sh

              # Full build. Only on tag pushes. Reuses the local Arch repo
              # that the slim build already staged into the airootfs, so no
              # need to rebuild the factorios-* PKGBUILDs.
              if [[ "$BUILD_FULL" == "true" ]]; then
                sudo -u builder ./iso/build.sh full
              fi
            '

      - name: Upload slim ISO as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: factorios-slim
          path: iso/out/factorios-2*.iso
          if-no-files-found: error
          retention-days: 30

      - name: Upload full ISO as workflow artifact (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: factorios-full
          path: iso/out/factorios-full-*.iso
          if-no-files-found: error
          retention-days: 30

      - name: Attach ISOs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            iso/out/factorios-2*.iso
            iso/out/factorios-full-*.iso
          generate_release_notes: true
