# Ensure /var/lib/factorios and its subtree are owned by the factorios
# user on every boot. factorios-launcher's PKGBUILD ships these as
# root-owned (it has to — PKGBUILD package() runs as fakeroot before any
# user exists), and factorios-base.install chowns them post-install, but
# anything that resets ownership (manual chown, partial reinstall) is
# self-healed by systemd-tmpfiles-setup.service early in boot.
#
# Format: type path mode user group age argument
d /var/lib/factorios          0755 factorios factorios - -
d /var/lib/factorios/versions 0755 factorios factorios - -
d /var/lib/factorios/users    0755 factorios factorios - -
# Home dir for the factorios user. sysusers.d declares the path but
# doesn't create it; profiles._link_home_factorio() symlinks
# ~/.factorio in here before launch, so the dir must exist.
d /home/factorios             0700 factorios factorios - -
