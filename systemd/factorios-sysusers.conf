# FactoriOS appliance user. Identity is factorio.com; the Unix account
# exists only to own the session, the data dirs, and the systemd unit.
#
# UID 1000 is hardcoded so /run/user/1000 (the runtime dir
# systemd-logind creates on PAM session open) matches the path other
# config refers to.
#
# Group memberships use `m` lines so missing-group errors are silently
# skipped (some installs may not have all four groups present at install
# time). The factorios-tmpfiles.conf snippet handles ownership of
# /var/lib/factorios after the user exists.
u factorios 1000 "FactoriOS appliance user" /home/factorios /usr/bin/nologin
m factorios seat
m factorios video
m factorios input
m factorios render
